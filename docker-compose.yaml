services:
  fitness-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fitness-api
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - MONGO_HOST=mongo
      - MONGO_PORT=27017
      - DB_NAME=fitness_tracker
    depends_on:
      - mongo
    volumes:
      - ./configs:/app/configs
    networks:
      - fitness-net

  mongo:
    image: mongo:7
    container_name: fitness-mongo
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=fitness_tracker
    volumes:
      - mongo-data:/data/db
      - ./mongo/init:/docker-entrypoint-initdb.d
    networks:
      - fitness-net

volumes:
  mongo-data:

networks:
  fitness-net:
    driver: bridge